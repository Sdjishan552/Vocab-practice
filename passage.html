<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passage Test</title>
  <link rel="stylesheet" href="style.css">
  <style>

    /* ===== ROOT ===== */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .passage-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0a0a18;
    }

    /* ===== HEADER ===== */
    .p-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      background: #0e0e1e;
      border-bottom: 2px solid #ff1a1a;
      flex-shrink: 0;
    }

    .p-header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 0;
      color: #e8e8f0;
      letter-spacing: 0.4px;
    }

    .p-header button {
      padding: 6px 16px;
      font-size: 0.8rem;
      background: #1e1e38;
      border: 1px solid #333355;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .p-header button:hover {
      border-color: #ff1a1a;
      color: #ff6b6b;
    }

    /* ===== SELECT SCREEN ===== */
    #selectScreen {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .select-heading {
      font-size: 0.72rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e38;
    }

    .passage-card {
      background: #12122a;
      border: 1px solid #252545;
      border-radius: 12px;
      padding: 18px 18px 14px 22px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .passage-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, #ff1a1a, #ff6b6b);
      border-radius: 4px 0 0 4px;
    }

    .passage-card:hover {
      border-color: rgba(255, 26, 26, 0.5);
      background: #15152e;
      transform: translateX(3px);
    }

    .passage-card:active {
      transform: scale(0.99) translateX(1px);
    }

    .passage-card h3 {
      margin: 0 0 8px 0;
      font-size: 0.93rem;
      font-weight: 600;
      color: #e0e0f0;
      line-height: 1.45;
    }

    .passage-card .p-meta {
      font-size: 0.76rem;
      color: #555;
      display: flex;
      gap: 16px;
    }

    .passage-card .p-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .no-passages {
      text-align: center;
      padding: 60px 20px;
      color: #444;
    }

    .no-passages .icon { font-size: 2.8rem; margin-bottom: 14px; }
    .no-passages h3 { font-size: 1rem; color: #666; margin-bottom: 8px; }
    .no-passages p { font-size: 0.84rem; line-height: 1.6; color: #555; }

    /* ===== SPLIT SCREEN ===== */
    #testScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ===== PASSAGE PANEL ===== */
    .passage-panel {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0c0c20;
      border-bottom: 2px solid rgba(255,26,26,0.5);
    }

    .passage-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #0e0e22;
      border-bottom: 1px solid #1e1e38;
      flex-shrink: 0;
    }

    .passage-panel-header h2 {
      font-size: 0.75rem;
      margin: 0;
      color: #ff6b6b;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .scroll-hint {
      font-size: 0.68rem;
      color: #3a3a5a;
      font-style: italic;
    }

    .passage-body {
      padding: 16px 18px 20px;
      font-size: 0.85rem;
      line-height: 1.85;
      color: #b8b8d0;
      overflow-y: auto;
      flex: 1;
    }

    /* ===== QUESTION PANEL ===== */
    .question-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #0a0a18;
    }

    /* ===== DESKTOP: Side-by-side ===== */
    @media (min-width: 768px) {
      #testScreen { flex-direction: row; }

      .passage-panel {
        flex: 0 0 48%;
        border-bottom: none;
        border-right: 2px solid rgba(255,26,26,0.4);
      }

      .question-panel { flex: 0 0 52%; }

      .passage-body { font-size: 0.88rem; }

      #selectScreen { padding: 32px 28px; }
    }

    /* ===== PROGRESS BAR ===== */
    .q-progress-wrap {
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .q-progress-text {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 7px;
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .q-progress-bar {
      height: 4px;
      background: #1a1a30;
      border-radius: 4px;
      overflow: hidden;
    }

    .q-progress-fill {
      height: 100%;
      background: linear-gradient(to right, #ff1a1a, #ff6b6b);
      border-radius: 4px;
      transition: width 0.35s ease;
    }

    /* ===== QUESTION TEXT ===== */
    .q-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e0f0;
      margin-bottom: 16px;
      line-height: 1.6;
      flex-shrink: 0;
      padding: 14px 16px;
      background: #12122a;
      border-radius: 10px;
      border-left: 3px solid #ff1a1a;
    }

    /* ===== OPTIONS ===== */
    #optionsContainer {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      background: #111128;
      border: 1px solid #202040;
      border-radius: 9px;
      color: #c0c0d8;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.18s;
      line-height: 1.5;
      gap: 8px;
    }

    .option-btn .opt-label {
      font-weight: 800;
      color: #ff6b6b;
      font-size: 0.78rem;
      min-width: 18px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #4fc3f7;
      background: #0e1a28;
      color: #d0eeff;
    }

    .option-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .option-btn.correct {
      background: rgba(76, 175, 80, 0.12) !important;
      border-color: #4caf50 !important;
      color: #a5d6a7 !important;
    }

    .option-btn.wrong {
      background: rgba(244, 67, 54, 0.12) !important;
      border-color: #f44336 !important;
      color: #ef9a9a !important;
    }

    .option-btn.correct .opt-label { color: #a5d6a7; }
    .option-btn.wrong .opt-label { color: #ef9a9a; }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.85;
    }

    /* ===== FEEDBACK MSG ===== */
    .feedback-msg {
      font-size: 0.8rem;
      margin: 10px 0 6px;
      font-weight: 600;
      flex-shrink: 0;
      min-height: 20px;
    }
    .feedback-msg.correct { color: #66bb6a; }
    .feedback-msg.wrong { color: #ef5350; }

    /* ===== NEXT BUTTON ===== */
    .next-btn {
      margin-top: 16px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #ff1a1a, #cc0000);
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-end;
      display: none;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .next-btn:hover { opacity: 0.88; }
    .next-btn:active { transform: scale(0.97); }
    .next-btn.visible { display: block; }

    /* ===== SCORE SCREEN ===== */
    #scoreScreen {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 36px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    .score-hero {
      background: linear-gradient(135deg, #12122e, #18183a);
      border: 1px solid #252550;
      border-radius: 16px;
      padding: 28px 24px 22px;
      margin-bottom: 20px;
      text-align: center;
    }

    .score-hero h2 {
      font-size: 1rem;
      color: #ff6b6b;
      margin: 0 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .score-hero .passage-subtitle {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .score-big {
      font-size: 3rem;
      font-weight: 800;
      color: #e8e8f8;
      line-height: 1;
      margin-bottom: 6px;
    }

    .score-big span {
      font-size: 1.4rem;
      color: #444;
      font-weight: 400;
    }

    .score-accuracy {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .score-grid-item {
      background: #0a0a1e;
      border: 1px solid #1e1e38;
      border-radius: 10px;
      padding: 12px 14px;
      text-align: left;
    }

    .score-grid-item .s-label {
      display: block;
      font-size: 0.68rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .score-grid-item .s-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e0e0f0;
    }

    .score-grid-item .s-value.green { color: #66bb6a; }
    .score-grid-item .s-value.red { color: #ef5350; }

    .score-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .score-actions button {
      padding: 11px 26px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .score-actions button:hover { opacity: 0.88; }
    .score-actions button:active { transform: scale(0.97); }

    .btn-retry { background: linear-gradient(135deg, #ff1a1a, #cc0000); color: white; }
    .btn-back { background: #1a1a32; color: #aaa; border: 1px solid #2a2a48; }

    /* ===== WRONG REVIEW ===== */
    .review-heading {
      font-size: 0.7rem;
      color: #ef5350;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin: 0 0 14px 0;
    }

    .wrong-card {
      background: #100c0c;
      border: 1px solid #2e1818;
      border-left: 4px solid #ef5350;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .wrong-card .wc-qnum {
      font-size: 0.68rem;
      color: #444;
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .wrong-card .wc-question {
      font-size: 0.86rem;
      color: #d0d0d0;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .wrong-card .wc-your {
      font-size: 0.79rem;
      color: #ef9a9a;
      margin-bottom: 4px;
    }

    .wrong-card .wc-correct {
      font-size: 0.79rem;
      color: #a5d6a7;
    }

    .perfect-msg {
      text-align: center;
      padding: 24px;
      color: #66bb6a;
      font-size: 1rem;
      font-weight: 600;
    }

    /* ===== LIGHT MODE ===== */
    body.light-mode .passage-page { background: #f4f4fc; }

    body.light-mode .p-header {
      background: #eaeaf8;
      border-bottom-color: #e11d48;
    }
    body.light-mode .p-header h1 { color: #111; }
    body.light-mode .p-header button {
      background: #dde;
      border-color: #bbb;
      color: #444;
    }

    body.light-mode .passage-panel,
    body.light-mode .passage-panel-header {
      background: #eeeef8;
    }

    body.light-mode .passage-body { color: #222; }

    body.light-mode .passage-panel-header h2 { color: #c0392b; }

    body.light-mode .passage-card {
      background: #e8e8f8;
      border-color: #ccc;
    }
    body.light-mode .passage-card h3 { color: #111; }

    body.light-mode #testScreen,
    body.light-mode .question-panel { background: #f4f4fc; }

    body.light-mode .q-text {
      background: #e8e8f4;
      border-left-color: #e11d48;
      color: #111;
    }

    body.light-mode .option-btn {
      background: #eaeaf4;
      border-color: #ccc;
      color: #222;
    }
    body.light-mode .option-btn:hover:not(:disabled) {
      background: #d8eeff;
      border-color: #4fc3f7;
    }

    body.light-mode .score-hero {
      background: #eaeaf8;
      border-color: #ccc;
    }
    body.light-mode .score-big { color: #111; }
    body.light-mode .score-grid-item {
      background: #ddddf0;
      border-color: #ccc;
    }

    body.light-mode .wrong-card {
      background: #fff0f0;
      border-color: #f5c0c0;
    }
    body.light-mode .wc-question { color: #222; }

    body.light-mode #selectScreen,
    body.light-mode #scoreScreen { background: #f4f4fc; }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }

  </style>
</head>
<body class="passage-page">

<!-- HEADER -->
<header class="p-header">
  <h1>📄 Passage Test</h1>
  <a href="index.html"><button>← Back</button></a>
</header>

<!-- SELECT SCREEN -->
<div id="selectScreen">
  <p class="select-heading">Select a Passage</p>
  <div id="passageList"></div>
</div>

<!-- TEST SCREEN (split) -->
<div id="testScreen" class="hidden">

  <!-- LEFT / TOP: Passage -->
  <div class="passage-panel">
    <div class="passage-panel-header">
      <h2 id="passagePanelTitle">📰 Passage</h2>
      <span class="scroll-hint">↕ scroll</span>
    </div>
    <div class="passage-body" id="passageBody"></div>
  </div>

  <!-- RIGHT / BOTTOM: Questions -->
  <div class="question-panel">
    <div class="q-progress-wrap">
      <div class="q-progress-text">
        <span id="qProgressText">Q 1 / 6</span>
        <span id="qScoreText">Score: 0</span>
      </div>
      <div class="q-progress-bar">
        <div class="q-progress-fill" id="qProgressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="q-text" id="qText"></div>
    <div id="optionsContainer"></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
    <button class="next-btn" id="nextBtn">Next →</button>
  </div>

</div>

<!-- SCORE SCREEN -->
<div id="scoreScreen" class="hidden">
  <div id="scoreContent"></div>
</div>


<script>

// ===== THEME =====
const savedTheme = localStorage.getItem("theme");
if (savedTheme === "light") document.body.classList.add("light-mode");

let db;
let currentPassage = null;
let currentQIndex = 0;
let userAnswers = [];
let currentScore = 0;
function savePassageResult(score, total, passageTitle) {
  const tx = db.transaction("sessions", "readwrite");
  const store = tx.objectStore("sessions");

  store.add({
    type: "passage",
    passageTitle: passageTitle,
    score: score,
    total: total,
    accuracy: (score / total) * 100,
    date: new Date()
  });
}
// ===== OPEN DB =====
const dbReq = indexedDB.open("VocabDB", 4);

dbReq.onupgradeneeded = function (event) {
  const d = event.target.result;
  if (!d.objectStoreNames.contains("words")) {
    d.createObjectStore("words", { keyPath: "id", autoIncrement: true });
  }
  if (!d.objectStoreNames.contains("sessions")) {
    d.createObjectStore("sessions", { keyPath: "id", autoIncrement: true });
  }
  if (!d.objectStoreNames.contains("passages")) {
    d.createObjectStore("passages", { keyPath: "id", autoIncrement: true });
  }
};

dbReq.onsuccess = function () {
  db = dbReq.result;
  loadPassageList();
};

dbReq.onerror = function () {
  document.getElementById("passageList").innerHTML =
    "<p style='color:#f44336;padding:20px;'>⚠️ Could not open database.</p>";
};

// ===== LOAD PASSAGE LIST =====
function loadPassageList() {
  const tx = db.transaction("passages", "readonly");
  const store = tx.objectStore("passages");
  const req = store.getAll();

  req.onsuccess = function () {
    const passages = req.result;
    const list = document.getElementById("passageList");

    if (!passages || passages.length === 0) {
      list.innerHTML = `
        <div class="no-passages">
          <div class="icon">📭</div>
          <h3>No passages uploaded yet</h3>
          <p>Upload an Excel file from the main dashboard.<br>Make sure it has a <strong>Passages</strong> sheet.</p>
        </div>`;
      return;
    }

    list.innerHTML = "";

    // Sort by newest first
    passages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    passages.forEach(p => {
      const card = document.createElement("div");
      card.className = "passage-card";
      const date = new Date(p.createdAt).toLocaleDateString("en-IN", {
        day: "numeric", month: "short"
      });
      card.innerHTML = `
        <h3>${p.title}</h3>
        <div class="p-meta">
          <span>❓ ${p.questions.length} questions</span>
          <span>📅 ${date}</span>
        </div>
      `;
      card.onclick = () => startTest(p);
      list.appendChild(card);
    });
  };
}

// ===== START TEST =====
function startTest(passage) {
  currentPassage = passage;
  currentQIndex = 0;
  userAnswers = new Array(passage.questions.length).fill(null);
  currentScore = 0;

  // Populate passage text
  document.getElementById("passagePanelTitle").innerText =
    "📰 " + passage.title;
  document.getElementById("passageBody").innerText = passage.text;

  document.getElementById("selectScreen").classList.add("hidden");
  document.getElementById("scoreScreen").classList.add("hidden");
  document.getElementById("testScreen").classList.remove("hidden");

  // Scroll passage to top
  document.querySelector(".passage-panel").scrollTop = 0;

  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = currentPassage.questions[currentQIndex];
  const total = currentPassage.questions.length;

  // Progress
  document.getElementById("qProgressText").innerText =
    `Q ${currentQIndex + 1} / ${total}`;
  document.getElementById("qScoreText").innerText =
    `Score: ${currentScore}`;
  document.getElementById("qProgressFill").style.width =
    (((currentQIndex + 1) / total) * 100) + "%";

  // Question text
  document.getElementById("qText").innerText = q.question;

  // Clear feedback
  const feedbackEl = document.getElementById("feedbackMsg");
  feedbackEl.innerText = "";
  feedbackEl.className = "feedback-msg";

  // Options
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  const labels = ["A", "B", "C", "D", "E"];
  const options = [q.optionA, q.optionB, q.optionC, q.optionD, q.optionE];

  options.forEach((opt, i) => {
    if (!opt || opt.trim() === "") return;

    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<span class="opt-label">${labels[i]})</span>${opt}`;
    btn.dataset.label = labels[i];
    btn.onclick = () => selectAnswer(labels[i], btn);
    container.appendChild(btn);
  });

  // Next button
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.remove("visible");
  const isLast = (currentQIndex === total - 1);
  nextBtn.innerText = isLast ? "Finish ✓" : "Next →";
  nextBtn.onclick = isLast ? finishTest : goNext;

  // Scroll question panel to top
  document.querySelector(".question-panel").scrollTop = 0;
}

// ===== SELECT ANSWER =====
function selectAnswer(label, clickedBtn) {
  // Disable all
  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach(b => b.disabled = true);

  const correct = currentPassage.questions[currentQIndex].correctAnswer
    .trim().toUpperCase();

  userAnswers[currentQIndex] = label;

  const isCorrect = (label === correct);

  if (isCorrect) currentScore++;

  // Highlight
  allBtns.forEach(btn => {
    if (btn.dataset.label === correct) {
      btn.classList.add("correct");
    } else if (btn === clickedBtn && !isCorrect) {
      btn.classList.add("wrong");
    }
  });

  // Feedback
  const feedbackEl = document.getElementById("feedbackMsg");
  if (isCorrect) {
    feedbackEl.innerText = "✅ Correct!";
    feedbackEl.className = "feedback-msg correct";
  } else {
    feedbackEl.innerText = `❌ Wrong! Correct answer: ${correct}`;
    feedbackEl.className = "feedback-msg wrong";
  }

  document.getElementById("nextBtn").classList.add("visible");
}

// ===== NEXT =====
function goNext() {
  currentQIndex++;
  renderQuestion();
}

// ===== FINISH TEST =====
function finishTest() {
  document.getElementById("testScreen").classList.add("hidden");
  document.getElementById("scoreScreen").classList.remove("hidden");

  const questions = currentPassage.questions;
  const total = questions.length;
  const wrong = total - currentScore;
  const accuracy = total > 0 ? ((currentScore / total) * 100).toFixed(1) : 0;
  savePassageResult(currentScore, total, currentPassage.title);
  const content = document.getElementById("scoreContent");
  content.innerHTML = "";

  // Hero card
  const hero = document.createElement("div");
  hero.className = "score-hero";
  hero.innerHTML = `
    <h2>📊 Result</h2>
    <div class="passage-subtitle">${currentPassage.title}</div>
    <div class="score-big">${currentScore}<span> / ${total}</span></div>
    <div class="score-accuracy">${accuracy}% accuracy</div>
    <div class="score-grid">
      <div class="score-grid-item">
        <span class="s-label">Correct</span>
        <span class="s-value green">${currentScore}</span>
      </div>
      <div class="score-grid-item">
        <span class="s-label">Wrong</span>
        <span class="s-value red">${wrong}</span>
      </div>
      <div class="score-grid-item">
        <span class="s-label">Total</span>
        <span class="s-value">${total}</span>
      </div>
      <div class="score-grid-item">
        <span class="s-label">Accuracy</span>
        <span class="s-value">${accuracy}%</span>
      </div>
    </div>
    <div class="score-actions">
      <button class="btn-retry" onclick="startTest(currentPassage)">🔄 Retry</button>
      <button class="btn-back" onclick="backToSelect()">← All Passages</button>
    </div>
  `;
  content.appendChild(hero);

  // Wrong review
  const wrongItems = questions
    .map((q, i) => ({ q, i, userAns: userAnswers[i] }))
    .filter(item => item.userAns !== item.q.correctAnswer.trim().toUpperCase());

  if (wrongItems.length === 0) {
    const p = document.createElement("div");
    p.className = "perfect-msg";
    p.innerHTML = "🔥 <strong>Perfect Score!</strong> All answers correct.";
    content.appendChild(p);
  } else {
    const heading = document.createElement("p");
    heading.className = "review-heading";
    heading.innerText = "❌ Wrong Answers Review";
    content.appendChild(heading);

    wrongItems.forEach(({ q, i, userAns }) => {
      const card = document.createElement("div");
      card.className = "wrong-card";

      const correct = q.correctAnswer.trim().toUpperCase();
      const userText = userAns ? getOptionText(q, userAns) : "Not answered";
      const correctText = getOptionText(q, correct);

      card.innerHTML = `
        <div class="wc-qnum">Q${i + 1}</div>
        <div class="wc-question">${q.question}</div>
        <div class="wc-your">Your answer: ${userAns || "—"}) ${userText}</div>
        <div class="wc-correct">Correct answer: ${correct}) ${correctText}</div>
      `;
      content.appendChild(card);
    });
  }
}

function getOptionText(q, label) {
  const map = {
    A: q.optionA, B: q.optionB, C: q.optionC,
    D: q.optionD, E: q.optionE
  };
  return map[label] || "";
}

function backToSelect() {
  document.getElementById("scoreScreen").classList.add("hidden");
  document.getElementById("testScreen").classList.add("hidden");
  document.getElementById("selectScreen").classList.remove("hidden");
  loadPassageList();
}

</script>
</body>
</html>
