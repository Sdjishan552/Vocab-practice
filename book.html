<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Book</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== ANTONYM DISPLAY ===== */
    .antonym-display {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82em;
      font-weight: 600;
      background-color: rgba(255, 107, 107, 0.12);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.4);
      letter-spacing: 0.2px;
    }

    .antonym-label {
      font-size: 0.75em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ff6b6b;
      margin-top: 8px;
      margin-bottom: 2px;
      opacity: 0.85;
    }

    /* Light mode override */
    body.light-mode .antonym-display {
      background-color: rgba(220, 50, 50, 0.08);
      color: #c0392b;
      border-color: rgba(220, 50, 50, 0.35);
    }

    body.light-mode .antonym-label {
      color: #c0392b;
    }
  </style>
</head>
<body class="book-page">

<header class="book-header">

  <div class="header-left">
    <h1>📖 Vocabulary Book</h1>
  </div>

  <div class="header-center" id="searchNavigator" style="display:none;">
    <button id="prevMatch">⬅ Prev</button>
    <span id="matchCounter" style="margin:0 10px;"></span>
    <button id="nextMatch">Next ➡</button>
  </div>

  <div class="header-right">
    <a href="index.html">
      <button>← Back to Dashboard</button>
    </a>
  </div>

</header>


<div class="book-filter">
  <select id="dateFilter">
    <option value="all">All Words</option>
    <option value="1">Last 1 Day</option>
    <option value="3">Last 3 Days</option>
    <option value="7">Last 7 Days</option>
    <option value="10">Last 10 Days</option>
    <option value="30">Last 30 Days</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search word..." class="book-search">
</div>

<div id="bookContainer" class="book-container"></div>

<script>

// ===== LOAD SAVED THEME =====
const savedTheme = localStorage.getItem("theme");
if (savedTheme === "light") {
  document.body.classList.add("light-mode");
}

let db;

const request = indexedDB.open("VocabDB", 3);

request.onupgradeneeded = function (event) {
  const d = event.target.result;
  if (!d.objectStoreNames.contains("words")) {
    d.createObjectStore("words", { keyPath: "id", autoIncrement: true });
  }
};

request.onerror = function () {
  document.getElementById("bookContainer").innerHTML =
    "<p>⚠️ Could not open database. Please go back and try again.</p>";
};

request.onsuccess = function () {
  db = request.result;
  loadBook("all");
};

// Filter change
document.getElementById("dateFilter").addEventListener("change", function () {
  loadBook(this.value);
});

// Search input
document.getElementById("searchInput").addEventListener("input", function () {
  const filterDays = document.getElementById("dateFilter").value;
  loadBook(filterDays);
});

// ===== BUILD SEARCH INDEX =====
// Now also searches antonyms
function buildSearchIndex(words) {
  return words.map(word => {
    const combinedText = (
      word.word + " " +
      word.meanings.join(" ") + " " +
      (word.antonyms || []).join(" ") + " " +
      (word.note || "")
    ).toLowerCase();

    return {
      mainWord: word.word,
      searchableText: combinedText
    };
  });
}

function loadBook(filterDays) {

  const container = document.getElementById("bookContainer");
  const searchNavigator = document.getElementById("searchNavigator");

  container.innerHTML = "";
  searchNavigator.style.display = "none";

  const transaction = db.transaction("words", "readonly");
  const store = transaction.objectStore("words");
  const req = store.getAll();

  req.onsuccess = function () {

    let words = req.result;
    const searchText = document.getElementById("searchInput").value.toLowerCase().trim();

    // ===== SEARCH FILTER =====
    if (searchText !== "") {

      const indexedWords = buildSearchIndex(words);

      const matches = indexedWords.filter(entry =>
        entry.searchableText.includes(searchText)
      );

      words = matches.map(entry =>
        words.find(w => w.word === entry.mainWord)
      );
    }

    if (!words || words.length === 0) {
      container.innerHTML = "<p>No words found.</p>";
      return;
    }

    // ===== DATE FILTER =====
    if (filterDays !== "all") {
      const days = parseInt(filterDays);

      if (days === 1) {
        // Calendar day: 12:00 AM to 11:59 PM today
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        words = words.filter(word =>
          new Date(word.createdAt).getTime() >= todayStart.getTime()
        );
      } else {
        const now = Date.now();
        const cutoff = now - (days * 24 * 60 * 60 * 1000);
        words = words.filter(word =>
          new Date(word.createdAt).getTime() >= cutoff
        );
      }
    }

    if (words.length === 0) {
      container.innerHTML = "<p>No words found for selected filter.</p>";
      return;
    }

    // ===== SORT ALPHABETICALLY =====
    words.sort((a, b) => a.word.localeCompare(b.word));

    let currentLetter = "";

    words.forEach(wordObj => {

      const firstLetter = wordObj.word.charAt(0).toUpperCase();

      if (firstLetter !== currentLetter) {
        currentLetter = firstLetter;

        const letter = document.createElement("h2");
        letter.className = "alphabet-title";
        letter.innerText = currentLetter;
        container.appendChild(letter);
      }

      const card = document.createElement("div");
      card.className = "book-word";
      card.style.position = "relative";

      const meanings = wordObj.meanings
        .map(m => `<li>${m}</li>`)
        .join("");

      // ===== ANTONYMS BLOCK =====
      const antonymHTML = (wordObj.antonyms && wordObj.antonyms.length > 0)
        ? `<div class="antonym-label">🔄 Antonyms</div>
           <div class="antonym-display">${wordObj.antonyms.join(" &nbsp;·&nbsp; ")}</div>`
        : "";

      card.innerHTML = `
        <button class="note-btn" onclick="editNote(${wordObj.id})">✏️</button>

        <h3>${wordObj.word}</h3>

        ${wordObj.phonetics ? `<div class="phonetics-badge">${wordObj.phonetics}</div>` : ""}

        <ul>${meanings}</ul>

        ${antonymHTML}

        ${wordObj.note ? `<div class="note-display">📝 ${wordObj.note}</div>` : ""}
      `;

      container.appendChild(card);
    });

    // ===== SEARCH NAVIGATION (AFTER RENDERING) =====
    if (searchText !== "") {

      const matchedElements = Array.from(
        document.querySelectorAll(".book-word")
      );

      if (matchedElements.length > 0) {

        let currentMatchIndex = 0;

        searchNavigator.style.display = "block";

        function highlightMatch(index) {

          matchedElements.forEach(el =>
            el.classList.remove("active-match")
          );

          const element = matchedElements[index];
          element.classList.add("active-match");

          const containerTop = container.getBoundingClientRect().top;
          const elementTop = element.getBoundingClientRect().top;

          container.scrollBy({
            top: elementTop - containerTop - 100,
            behavior: "smooth"
          });

          document.getElementById("matchCounter").innerText =
            `${index + 1} / ${matchedElements.length}`;
        }

        highlightMatch(0);

        document.getElementById("nextMatch").onclick = function () {
          currentMatchIndex =
            (currentMatchIndex + 1) % matchedElements.length;
          highlightMatch(currentMatchIndex);
        };

        document.getElementById("prevMatch").onclick = function () {
          currentMatchIndex =
            (currentMatchIndex - 1 + matchedElements.length) %
            matchedElements.length;
          highlightMatch(currentMatchIndex);
        };
      }
    }
  };
}

function editNote(wordId) {

  const transaction = db.transaction("words", "readwrite");
  const store = transaction.objectStore("words");

  const request = store.get(wordId);

  request.onsuccess = function () {

    const word = request.result;
    if (!word) return;

    const newNote = prompt("✏️ Add / Edit Note:", word.note || "");

    if (newNote !== null) {
      word.note = newNote.trim();
      store.put(word);

      loadBook(document.getElementById("dateFilter").value);
    }
  };
}
</script>

</body>
</html>
